<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Cadastro | Cuida+</title>

<link rel="stylesheet" href="../Style/cadastro.css">

</head>

<body>

<header class="topo">
<h1>🐶 Cadastro de Usuário</h1>
<p>Crie sua conta e cadastre seu cachorro</p>
</header>


<section class="cadastro-container">

<form>

<h2>Informações do Usuário</h2>

<label>Nome completo</label>
<input type="text" placeholder="Digite seu nome completo" required>

<label>Email</label>
<input type="email" placeholder="Digite seu email" required>

<label>Senha</label>
<input type="password" placeholder="Crie uma senha" required>

<label>Cidade</label>
<input type="text" placeholder="Digite sua cidade" required>


<h2>Informações do Cachorro</h2>

<label>Nome do cachorro</label>
<input type="text" placeholder="Nome do pet">

<label>Raça</label>
<input type="text" placeholder="Ex: Labrador">

<label>Idade</label>
<input type="number" placeholder="Idade do cachorro">

<label>Porte</label>
<select>
<option>Pequeno</option>
<option>Médio</option>
<option>Grande</option>
</select>

<label>Observações</label>
<textarea placeholder="Comportamento, alergias, cuidados especiais..."></textarea>

<button type="submit">Cadastrar</button>

</form>

</section>

</body>
</html>
