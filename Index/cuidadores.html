<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cuidadores - 🐶 ConectaPet</title>

<link rel="stylesheet" href="../Style/cuidadores.css">

</head>

<body>

<header class="header">

<div class="logo">
<a href="../index.html" class="logo-link">
<h1>🐶 ConectaPet</h1>
</a>
<p>Conectando tutores a cuidadores de cães</p>
</div>

<nav class="menu">
<a href="../index.html">Início</a>
<a href="cuidadores.html">Cuidadores</a>
<a href="#">Serviços</a>
<a href="#">Adoção</a>
<a href="#">Cadastro</a>
</nav>

</header>


<section class="section">

<h2>Cadastro de Cuidador</h2>

<form class="form-cuidador">

<label>Nome completo</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Telefone</label>
<input type="tel" required>

<label>Cidade</label>
<input type="text" required>

<label>Você já cuidou de cães antes?</label>
<select required>
<option>Sim</option>
<option>Não</option>
</select>

<h2>Questionário sobre Cuidados com Cães</h2>

<label>1. Você gosta de trabalhar com animais?</label>
<select>
<option>Sim</option>
<option>Não</option>
</select>

<label>2. Quantas horas por dia pode cuidar de cães?</label>
<select>
<option>1-3 horas</option>
<option>4-6 horas</option>
<option>Tempo integral</option>
</select>

<label>3. Você sabe lidar com cães agitados?</label>
<select>
<option>Sim</option>
<option>Não</option>
</select>

<label>4. Já teve algum animal de estimação?</label>
<select>
<option>Sim</option>
<option>Não</option>
</select>

<label>5. Você sabe identificar quando um cão está doente?</label>
<select>
<option>Sim</option>
<option>Não</option>
</select>

<label>6. Você tem paciência com cães filhotes?</label>
<select>
<option>Sim</option>
<option>Não</option>
</select>

<label>7. Você estaria disposto a passear com o cão?</label>
<select>
<option>Sim</option>
<option>Não</option>
</select>

<label>8. Você saberia agir em uma emergência com o animal?</label>
<select>
<option>Sim</option>
<option>Não</option>
</select>

<label>9. Você aceita cuidar de mais de um cão?</label>
<select>
<option>Sim</option>
<option>Não</option>
</select>

<label>10. Por que você quer ser cuidador?</label>
<textarea rows="4"></textarea>

<br><br>

<button class="btn">Enviar Cadastro</button>

</form>

</section>


<footer>

<p>© 2026 Cuida+ - Plataforma de cuidados caninos</p>

</footer>

</body>
</html>
